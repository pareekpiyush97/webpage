<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nike</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* Navbar */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#000;
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff4d4d;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin:0 15px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#ff4d4d;
}

/* Hero Section */

.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
}

.hero-content h1{
    font-size:70px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:22px;
    margin-bottom:30px;
    color:#ddd;
}

.btn{
    padding:15px 35px;
    border:none;
    background:#ff4d4d;
    color:white;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:white;
    color:#ff4d4d;
}

/* Products */

.products{
    padding:80px 8%;
}

.products h2{
    text-align:center;
    font-size:45px;
    margin-bottom:50px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background:#1b1b1b;
    border-radius:20px;
    overflow:hidden;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:20px;
    text-align:center;
}

.card-content h3{
    margin-bottom:10px;
}

.price{
    color:#ff4d4d;
    font-size:22px;
    margin-bottom:15px;
}

/* Footer */

footer{
    background:#000;
    padding:30px;
    text-align:center;
    margin-top:50px;
    color:#aaa;
}

/* Responsive */

@media(max-width:768px){

.hero-content h1{
    font-size:45px;
}

.hero-content p{
    font-size:18px;
}

}

</style>
</head>
<body>

<!-- Navbar -->

<nav>
    <div class="logo">SHOE-X</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Collection</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- Hero -->

<section class="hero">
    <div class="hero-content">
        <h1>Step Into Style</h1>
        <p>Premium Sneakers For Every Generation</p>
        <button class="btn">Shop Now</button>
    </div>
</section>

<!-- Products -->

<section class="products">

    <h2>Trending Shoes</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800&auto=format&fit=crop">
            <div class="card-content">
                <h3>Red Runner</h3>
                <div class="price">₹2,999</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=800&auto=format&fit=crop">
            <div class="card-content">
                <h3>Urban Sneaker</h3>
                <div class="price">₹3,499</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=800&auto=format&fit=crop">
            <div class="card-content">
                <h3>Street Flex</h3>
                <div class="price">₹4,199</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

    </div>

</section>

<!-- Footer -->

<footer>
    © 2026 SHOE-X | All Rights Reserved
</footer>

</body>
</html>
